[build]
  # Use build:prod (vite.config.local.ts) which does NOT require PORT/BASE_PATH env vars.
  command = "pnpm --filter @workspace/ai-deep-words run build:prod"
  publish = "artifacts/ai-deep-words/dist/public"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: client-side routing (wouter) needs all paths to serve index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
