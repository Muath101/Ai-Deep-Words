<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ai Deep Words</title>
    <meta name="description" content="AI Deep Words is the leading Arabic AI infrastructure company — production-grade Arabic voice datasets, NLP annotation pipelines, and dialect-aware AI infrastructure across 22+ Arab countries and 32+ dialects." />
    <meta name="keywords" content="Arabic AI, Arabic NLP, Arabic voice datasets, Arabic speech recognition, Arabic language AI, dialect annotation, Arabic machine learning" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aidpwords.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="AI Deep Words | Arabic AI Infrastructure" />
    <meta property="og:description" content="Production-grade Arabic voice datasets, NLP pipelines, and dialect-aware AI infrastructure across 22+ Arab countries and 32+ dialects." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aidpwords.com" />
    <meta property="og:site_name" content="AI Deep Words" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Deep Words | Arabic AI Infrastructure" />
    <meta name="twitter:description" content="Production-grade Arabic voice datasets, NLP pipelines, and dialect-aware AI infrastructure across 22+ Arab countries and 32+ dialects." />
    <meta name="twitter:site" content="@aidpwords" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AI Deep Words",
      "url": "https://aidpwords.com",
      "email": "partner@aidpwords.com",
      "description": "Arabic AI infrastructure company specializing in voice datasets, NLP annotation pipelines, and dialect-aware AI infrastructure.",
      "areaServed": "Arab World",
      "sameAs": []
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />

    <!-- Fonts: English + Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Hidden static form so Netlify detects "enterprise-inquiry" at build time.
         The React form (Contact.tsx) submits to it via fetch. -->
    <form name="enterprise-inquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="enterprise-inquiry" />
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="text" name="organization" />
      <input type="text" name="inquiryType" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
