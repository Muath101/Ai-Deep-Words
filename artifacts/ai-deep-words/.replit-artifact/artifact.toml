kind = "web"
previewPath = "/"
title = "AI Deep Words"
version = "1.0.0"
id = "artifacts/ai-deep-words"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18213

[services.development]
run = "pnpm --filter @workspace/ai-deep-words run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-deep-words", "run", "build" ]
publicDir = "artifacts/ai-deep-words/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18213"
BASE_PATH = "/"
